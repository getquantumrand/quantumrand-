name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      ENV: test
      ADMIN_SECRET: test-secret
      PILOTOS_API_KEY: enabled
      PILOTOS_PORT: "7100"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Set up Firebase credentials
        env:
          FIREBASE_CREDENTIALS_JSON: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
        run: |
          if [ -n "$FIREBASE_CREDENTIALS_JSON" ]; then
            echo "$FIREBASE_CREDENTIALS_JSON" > /tmp/firebase-creds.json
            echo "FIREBASE_CREDENTIALS=/tmp/firebase-creds.json" >> $GITHUB_ENV
            echo "Firebase credentials written to file"
          fi

      - name: Run tests
        env:
          FIREBASE_CREDENTIALS_JSON: ""
        run: |
          if [ -z "$FIREBASE_CREDENTIALS" ]; then
            echo "::warning::Firebase credentials not set — skipping Firestore-dependent tests"
            python -m pytest tests/test_phase1.py -v -s --tb=short || true
          else
            python -m pytest tests/ -v -s --tb=short
          fi

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check for syntax errors
        run: python -m py_compile app/main.py app/database.py app/auth.py app/config.py app/quantum_engine.py

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pip-audit

      - name: Audit dependencies
        run: pip-audit --strict || true

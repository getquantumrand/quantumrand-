name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      ENV: test
      ADMIN_SECRET: test-secret
      PILOTOS_API_KEY: enabled
      PILOTOS_PORT: "7100"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Set up Firebase credentials
        run: |
          cat <<'ENDOFCREDS' > /tmp/firebase-creds.json
          ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
          ENDOFCREDS
          # Clean up: remove leading whitespace from heredoc
          python3 -c "
          import json, sys
          with open('/tmp/firebase-creds.json') as f:
              raw = f.read().strip()
          # Parse and re-serialize to fix any formatting issues
          try:
              data = json.loads(raw)
          except json.JSONDecodeError:
              # Handle newlines in PEM key
              data = json.loads(raw.replace(chr(10), '\\\\n').replace('\\\\n\\\\n', '\\\\n'))
          with open('/tmp/firebase-creds.json', 'w') as f:
              json.dump(data, f)
          print('Firebase credentials file ready')
          "

      - name: Run tests
        env:
          FIREBASE_CREDENTIALS: /tmp/firebase-creds.json
        run: |
          if [ ! -s /tmp/firebase-creds.json ]; then
            echo "::warning::Firebase credentials not available — skipping Firestore tests"
            python -m pytest tests/test_phase1.py -v -s --tb=short || true
          else
            python -m pytest tests/ -v -s --tb=short
          fi

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check for syntax errors
        run: python -m py_compile app/main.py app/database.py app/auth.py app/config.py app/quantum_engine.py

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pip-audit

      - name: Audit dependencies
        run: pip-audit --strict || true

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      ENV: test
      ADMIN_SECRET: test-secret
      PILOTOS_API_KEY: enabled
      PILOTOS_PORT: "7100"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Debug Firebase JSON
        env:
          FIREBASE_CREDENTIALS_JSON: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
        run: python3 -c "import os,json;raw=os.environ['FIREBASE_CREDENTIALS_JSON'];print('len:',len(raw));print('first80:',repr(raw[:80]));d=json.loads(raw);pk=d.get('private_key','');print('pk_len:',len(pk));print('pk_start:',repr(pk[:50]))" 2>&1 || echo "json.loads failed, trying with newline fix" && python3 -c "import os,json,re;raw=os.environ['FIREBASE_CREDENTIALS_JSON'];fixed=re.sub(r'(?<=\")([^\"]*?)(?=\")',lambda m:m.group(0).replace(chr(10),'\\\\n'),raw);d=json.loads(fixed);pk=d.get('private_key','');print('fixed_pk_len:',len(pk));print('fixed_pk_start:',repr(pk[:50]))" 2>&1 || echo "both failed"

      - name: Run tests
        env:
          FIREBASE_CREDENTIALS_JSON: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
        run: |
          if [ -z "$FIREBASE_CREDENTIALS_JSON" ]; then
            echo "::warning::FIREBASE_CREDENTIALS_JSON not set — skipping Firestore-dependent tests"
            python -m pytest tests/test_phase1.py -v -s --tb=short || true
          else
            python -m pytest tests/ -v -s --tb=short
          fi

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check for syntax errors
        run: python -m py_compile app/main.py app/database.py app/auth.py app/config.py app/quantum_engine.py

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pip-audit

      - name: Audit dependencies
        run: pip-audit --strict || true

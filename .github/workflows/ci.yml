name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      ENV: test
      ADMIN_SECRET: test-secret
      PILOTOS_API_KEY: enabled
      PILOTOS_PORT: "7100"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up Firebase credentials
        env:
          FIREBASE_CREDENTIALS_JSON: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
        run: |
          if [ -z "$FIREBASE_CREDENTIALS_JSON" ]; then
            echo "Warning: FIREBASE_CREDENTIALS_JSON not set, skipping Firestore tests"
            exit 0
          fi

      - name: Run tests
        env:
          FIREBASE_CREDENTIALS_JSON: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
        run: python -m pytest tests/ -v -s --tb=short

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check for syntax errors
        run: python -m py_compile app/main.py app/database.py app/auth.py app/config.py app/quantum_engine.py

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pip-audit

      - name: Audit dependencies
        run: pip-audit --strict || true

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — QuantumRand</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface-2: #1a1a1a;
      --border: #222222;
      --text: #e0e0e0;
      --text-muted: #888888;
      --accent: #4f8ef7;
      --accent-glow: rgba(79, 142, 247, 0.15);
      --accent-hover: #6ba0ff;
      --radius: 10px;
      --error: #e06c75;
    }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      color: var(--accent-hover);
    }

    .logo {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: #fff;
      margin-bottom: 2.5rem;
      text-align: center;
    }

    .logo span {
      color: var(--accent);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 0.4rem;
    }

    .card-subtitle {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-weight: 300;
      margin-bottom: 2rem;
    }

    .field {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.88rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    input::placeholder {
      color: #444;
    }

    .btn-primary {
      display: block;
      width: 100%;
      padding: 0.8rem 1.4rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.88rem;
      font-weight: 600;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
      margin-top: 0.5rem;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      box-shadow: 0 0 24px var(--accent-glow);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error-msg {
      font-size: 0.78rem;
      color: var(--error);
      margin-top: 1rem;
      padding: 0.6rem 0.9rem;
      background: rgba(224, 108, 117, 0.08);
      border: 1px solid rgba(224, 108, 117, 0.25);
      border-radius: 6px;
      display: none;
    }

    .error-msg.visible {
      display: block;
    }

    .footer-link {
      text-align: center;
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 1.75rem;
    }
  </style>
</head>
<body>

  <div class="logo">QUANTUM<span>RAND</span></div>

  <div class="card">
    <div class="card-title">Welcome back</div>
    <div class="card-subtitle">Sign in to your QuantumRand account.</div>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="you@example.com"
          autocomplete="email"
          required
        >
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Your password"
          autocomplete="current-password"
          required
        >
      </div>
      <button type="submit" class="btn-primary" id="submitBtn">Log In</button>
      <div class="error-msg" id="errorMsg"></div>
    </form>
  </div>

  <div class="footer-link">
    Don't have an account? <a href="/signup">Sign up</a>
  </div>

  <script>
    var form = document.getElementById('loginForm');
    var submitBtn = document.getElementById('submitBtn');
    var errorMsg = document.getElementById('errorMsg');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
    }

    function clearError() {
      errorMsg.classList.remove('visible');
      errorMsg.textContent = '';
    }

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      clearError();

      var email = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;

      if (!email) { showError('Email is required.'); return; }
      if (!password) { showError('Password is required.'); return; }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in...';

      try {
        var resp = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, password: password })
        });

        var data = await resp.json();

        var d = data.data || data;
        if (resp.ok && d.token) {
          document.cookie = 'qr_token=' + d.token + '; path=/; SameSite=Lax; max-age=604800';
          window.location.href = '/dashboard';
        } else {
          showError(data.detail || data.error || 'Invalid email or password.');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Log In';
        }
      } catch (err) {
        showError('Could not connect to server. Please try again.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Log In';
      }
    });
  </script>

</body>
</html>

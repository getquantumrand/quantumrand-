<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Status — QuantumRand</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #0a0a0a; --surface: #111111; --surface-2: #1a1a1a; --border: #222222; --text: #e0e0e0; --text-muted: #888888; --accent: #4f8ef7; --green: #22c55e; --red: #ef4444; --yellow: #eab308; --radius: 10px; }
    body { font-family: 'JetBrains Mono', monospace; background: var(--bg); color: var(--text); line-height: 1.6; -webkit-font-smoothing: antialiased; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .container { max-width: 640px; margin: 0 auto; padding: 4rem 2rem; }
    .back { display: inline-block; margin-bottom: 2rem; font-size: 0.85rem; }
    h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; }

    .overall {
      display: flex; align-items: center; gap: 1rem;
      padding: 1.5rem; margin: 2rem 0;
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    }
    .overall-dot {
      width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0;
      animation: pulse 2s ease-in-out infinite;
    }
    .overall-dot.healthy { background: var(--green); box-shadow: 0 0 12px rgba(34,197,94,0.4); }
    .overall-dot.unhealthy { background: var(--red); box-shadow: 0 0 12px rgba(239,68,68,0.4); }
    .overall-dot.loading { background: var(--yellow); box-shadow: 0 0 12px rgba(234,179,8,0.4); }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
    .overall-text { font-size: 1.1rem; font-weight: 600; }
    .overall-text.healthy { color: var(--green); }
    .overall-text.unhealthy { color: var(--red); }
    .overall-text.loading { color: var(--yellow); }

    .components { margin: 2rem 0; }
    .component {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 1.25rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); margin-bottom: 0.5rem;
    }
    .component-name { font-size: 0.85rem; color: var(--text); }
    .component-status { font-size: 0.8rem; font-weight: 600; }
    .component-status.ok { color: var(--green); }
    .component-status.down { color: var(--red); }
    .component-status.checking { color: var(--yellow); }

    .metrics {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem;
      margin: 2rem 0;
    }
    .metric {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1rem; text-align: center;
    }
    .metric-value { font-size: 1.25rem; font-weight: 700; color: #fff; }
    .metric-label { font-size: 0.7rem; color: var(--text-muted); margin-top: 0.25rem; }

    .last-check { font-size: 0.75rem; color: var(--text-muted); text-align: center; margin-top: 2rem; }

    .refresh-btn {
      display: block; margin: 1.5rem auto 0;
      padding: 0.5rem 1.5rem;
      font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; font-weight: 600;
      background: transparent; color: var(--accent); border: 1px solid var(--accent);
      border-radius: var(--radius); cursor: pointer; transition: all 0.2s;
    }
    .refresh-btn:hover { background: rgba(79,142,247,0.1); }
    .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    footer { text-align: center; padding: 3rem 2rem; border-top: 1px solid var(--border); font-size: 0.75rem; color: var(--text-muted); }

    @media (max-width: 500px) { .metrics { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back">&larr; Back to QuantumRand</a>
    <h1>System Status</h1>

    <div class="overall">
      <div class="overall-dot loading" id="overallDot"></div>
      <div class="overall-text loading" id="overallText">Checking...</div>
    </div>

    <div class="components">
      <div class="component">
        <span class="component-name">API</span>
        <span class="component-status checking" id="statusApi">checking...</span>
      </div>
      <div class="component">
        <span class="component-name">Database (Firestore)</span>
        <span class="component-status checking" id="statusDb">checking...</span>
      </div>
      <div class="component">
        <span class="component-name">Quantum Engine</span>
        <span class="component-status checking" id="statusEngine">checking...</span>
      </div>
      <div class="component">
        <span class="component-name">Entropy Pool</span>
        <span class="component-status checking" id="statusPool">checking...</span>
      </div>
    </div>

    <div class="metrics">
      <div class="metric">
        <div class="metric-value" id="metricUptime">--</div>
        <div class="metric-label">Uptime</div>
      </div>
      <div class="metric">
        <div class="metric-value" id="metricLatency">--</div>
        <div class="metric-label">Response (ms)</div>
      </div>
      <div class="metric">
        <div class="metric-value" id="metricMemory">--</div>
        <div class="metric-label">Memory (MB)</div>
      </div>
    </div>

    <button class="refresh-btn" id="refreshBtn" onclick="checkHealth()">Refresh</button>
    <div class="last-check" id="lastCheck"></div>
  </div>

  <footer>
    &copy; 2026 QuantumRand. Built on quantum physics.
    &nbsp;&middot;&nbsp; <a href="/terms">Terms</a>
    &nbsp;&middot;&nbsp; <a href="/privacy">Privacy</a>
    &nbsp;&middot;&nbsp; <a href="/docs">API Docs</a>
    &nbsp;&middot;&nbsp; <a href="mailto:jbearswrld@proton.me">Contact</a>
  </footer>

  <script>
    function formatUptime(seconds) {
      var d = Math.floor(seconds / 86400);
      var h = Math.floor((seconds % 86400) / 3600);
      var m = Math.floor((seconds % 3600) / 60);
      if (d > 0) return d + 'd ' + h + 'h';
      if (h > 0) return h + 'h ' + m + 'm';
      return m + 'm';
    }

    function setStatus(id, ok, label) {
      var el = document.getElementById(id);
      el.textContent = label || (ok ? 'operational' : 'down');
      el.className = 'component-status ' + (ok ? 'ok' : 'down');
    }

    async function checkHealth() {
      var btn = document.getElementById('refreshBtn');
      btn.disabled = true;
      btn.textContent = 'Checking...';

      var dot = document.getElementById('overallDot');
      var text = document.getElementById('overallText');

      try {
        var start = performance.now();
        var resp = await fetch('/health');
        var clientLatency = Math.round(performance.now() - start);
        var json = await resp.json();
        var d = json.data;

        var healthy = d.status === 'healthy';
        dot.className = 'overall-dot ' + (healthy ? 'healthy' : 'unhealthy');
        text.className = 'overall-text ' + (healthy ? 'healthy' : 'unhealthy');
        text.textContent = healthy ? 'All Systems Operational' : 'Degraded Performance';

        setStatus('statusApi', true);
        setStatus('statusDb', d.database === 'connected');
        setStatus('statusEngine', d.quantum_engine === 'healthy');

        var pool = d.entropy_pool || {};
        var poolOk = pool.pool_healthy !== false;
        setStatus('statusPool', poolOk, poolOk ? 'operational (' + pool.pool_size_bits + ' bits)' : 'filling...');

        document.getElementById('metricUptime').textContent = formatUptime(d.uptime_seconds || 0);
        document.getElementById('metricLatency').textContent = clientLatency;
        document.getElementById('metricMemory').textContent = d.memory_mb || '--';

        document.getElementById('lastCheck').textContent = 'Last checked: ' + new Date().toLocaleTimeString();
      } catch (e) {
        dot.className = 'overall-dot unhealthy';
        text.className = 'overall-text unhealthy';
        text.textContent = 'Unable to reach API';
        setStatus('statusApi', false, 'unreachable');
        setStatus('statusDb', false, 'unknown');
        setStatus('statusEngine', false, 'unknown');
        setStatus('statusPool', false, 'unknown');
        document.getElementById('lastCheck').textContent = 'Last checked: ' + new Date().toLocaleTimeString() + ' (failed)';
      }

      btn.disabled = false;
      btn.textContent = 'Refresh';
    }

    // Auto-check on load
    checkHealth();

    // Auto-refresh every 60 seconds
    setInterval(checkHealth, 60000);
  </script>
</body>
</html>
